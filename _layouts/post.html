<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ site.baseurl }}/style.css">
</head>

<body>
    <!-- Modern Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{{ site.baseurl }}/">
                <i class="bi bi-code-square"></i>
                ToolKitHubs
            </a>
        </div>
    </nav>

    <div class="main-container">
        <!-- Back Button -->
        <a href="{{ site.baseurl }}/" class="back-btn">
            <i class="bi bi-arrow-left"></i>
            Back to Home
        </a>

        <!-- Post Content -->
        <article class="post-container">
            <header class="post-header">
                <h1>{{ page.title }}</h1>
                
                <div class="post-meta">
                    <span>
                        <i class="bi bi-calendar3"></i>
                        {{ page.date | date: "%B %d, %Y" }}
                    </span>
                    <span>
                        <i class="bi bi-clock"></i>
                        5 min read
                    </span>
                    <span>
                        <i class="bi bi-person"></i>
                        Admin
                    </span>
                </div>
            </header>

            <!-- Featured Image based on content -->
            {% if page.title contains 'SQL' %}
                <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=1200&auto=format&fit=crop" 
                     alt="{{ page.title }}" 
                     class="featured-image">
            {% elsif page.title contains 'JavaScript' %}
                <img src="https://images.unsplash.com/photo-1579468118864-1b9ea3c0db4a?w=1200&auto=format&fit=crop" 
                     alt="{{ page.title }}" 
                     class="featured-image">
            {% else %}
                <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=1200&auto=format&fit=crop" 
                     alt="{{ page.title }}" 
                     class="featured-image">
            {% endif %}

            <div class="post-content">
                {{ content }}
            </div>

            <!-- Share Section -->
            <div class="mt-5 pt-4 border-top">
                <h5 class="mb-3">Share this article:</h5>
                <div class="d-flex gap-2">
                    <a href="#" class="btn btn-outline-primary rounded-pill">
                        <i class="bi bi-twitter"></i> Twitter
                    </a>
                    <a href="#" class="btn btn-outline-primary rounded-pill">
                        <i class="bi bi-linkedin"></i> LinkedIn
                    </a>
                    <a href="#" class="btn btn-outline-primary rounded-pill">
                        <i class="bi bi-facebook"></i> Facebook
                    </a>
                </div>
            </div>
        </article>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
