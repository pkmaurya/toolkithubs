title: ToolKitHubs Blog
description: Modern developer tutorials, tools, and insights
baseurl: "/toolkithubs"
permalink: /:title/

# Author settings
author: ToolKitHubs Team

# Social links
github_username: toolkithubs
twitter_username: toolkithubs

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Default front matter
defaults:
  - scope:
      path: ""
      values:
        author: "ToolKitHubs Team"
        image: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=800&auto=format&fit=crop"
