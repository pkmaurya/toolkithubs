---
layout: default
title: Blog
---

<h1>Latest Blog Posts</h1>

<div class="blog-container">

{% for post in site.posts %}

<div class="blog-card">

<img src="{{ post.image }}" class="blog-img">

<h2>
<a href="{{ post.url }}">{{ post.title }}</a>
</h2>

<p>{{ post.date | date: "%B %d, %Y" }}</p>

<p>{{ post.excerpt }}</p>

<a href="{{ post.url }}">Read More</a>

</div>

{% endfor %}

</div>
