---
layout: default
title: Blog
---

<link rel="stylesheet" href="/toolkithubs/style.css">

<div class="navbar">
<h2>ToolKitHubs</h2>
</div>

<div class="container">

{% for post in site.posts %}

<div class="blog-card">

<img src="{{ post.image }}" class="thumb">

<div class="content">

<h2>
<a href="{{ post.url }}">{{ post.title }}</a>
</h2>

<p class="meta">
{{ post.date | date: "%B %d, %Y" }}
</p>

<p>{{ post.excerpt }}</p>

<a href="{{ post.url }}" class="read-btn">
Read More →
</a>

</div>

</div>

{% endfor %}

</div>
